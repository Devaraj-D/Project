<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TalentConnect{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 8px;
            background-color: #007bff;
            color: white;
        }
        main {
            flex: 1;
            padding: 20px;
            background-color: #f4f4f4;
        }
        footer {
            text-align: center;
            padding: 6px;
            background-color: #e0d0d0;
        }
    </style>
    {% block styles %}{% endblock %}
</head>
<body>
    <header>
        <h1>TalentConnect</h1>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer style="background-color: rgba(224, 208, 208, 0.9); color: #333; text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.7);">
        <p>&copy; 2024 TalentConnect. All Rights Reserved.</p>
    </footer>
</body>
</html>
