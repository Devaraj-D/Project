<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        *{
            background-image:url(project2\static\assests\happy-man-pointing.png);
        }
        body {
           /* background: linear-gradient(to right, #4facfe, #00f2fe); */
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            background: #AF9284;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            margin: auto;
        }
        h2 {
            color: #333;
        }
        .btn {
            background-color: #FFA2BF;
            border: none;
        }
        .btn:hover {
            background-color: #FFA2BF;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .form-label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Sign Up</h2>
        
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        
        <!-- Sign-Up Form -->
        <form action="/signup" method="POST" class="mt-3">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <div class="mb-3">
                <label for=" confirm_password" class="form-label"> Confirm Password</label>
                <input type="password" name="confirm_password" id="password" class="form-control" placeholder="Confirm Password" required>
            </div>
            
            <div class="mb-3">
                <label for="role" class="form-label">Role</label>
                <select name="role" id="role" class="form-select">
                    <option value="student">Student</option>
                    <option value="company">Employer</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-success w-100">Sign Up</button>
        </form>
        
        <div class="text-center mt-3">
            <p style="color: #333;">Already have an account? <a href="/login" style="color: #007bff;">Login here</a></p>
        </div>
    </div>
    
    <!-- Bootstrap Scripts -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-QF6hHH8bN1Hg5yb+Nl8hhZkIHDrp98e3ZLZZun7MxBIB1aXfcSJVw9WHAIHn7wW6" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js" integrity="sha384-wEmeIV1mKuiNp12S7Lc8W8LYT6B0QXT0eMZgFYTDxR3jgFEsDXltx2bUfjzB2da/" crossorigin="anonymous"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
